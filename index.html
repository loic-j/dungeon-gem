<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Crawler</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #app {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 480px;
        height: 854px;
        transform-origin: center center;
        transform: translate(-50%, -50%);
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="ui"></div>
    </div>
    <script>
      (function () {
        function resize() {
          var scale = Math.min(window.innerWidth / 480, window.innerHeight / 854, 1)
          document.getElementById('app').style.transform =
            'translate(-50%, -50%) scale(' + scale + ')'
        }
        resize()
        window.addEventListener('resize', resize)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
