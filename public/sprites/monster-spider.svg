<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" width="280" height="360">
  <!-- Legs drawn first so body renders on top -->
  <!-- Left legs (front to back) with bent joints -->
  <polyline points="19,24 10,13 5,4" fill="none" stroke="#2a1608" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="17,30 5,25 3,17" fill="none" stroke="#2a1608" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="17,37 4,37 3,48" fill="none" stroke="#2a1608" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="18,43 8,55 4,66" fill="none" stroke="#2a1608" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right legs (mirrored) -->
  <polyline points="51,24 60,13 65,4" fill="none" stroke="#2a1608" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="53,30 65,25 67,17" fill="none" stroke="#2a1608" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="53,37 66,37 67,48" fill="none" stroke="#2a1608" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="52,43 62,55 66,66" fill="none" stroke="#2a1608" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ABDOMEN (large, egg-shaped, lower) -->
  <ellipse cx="35" cy="66" rx="20" ry="19" fill="#1a0e06"/>
  <ellipse cx="35" cy="65" rx="18" ry="17" fill="#2d1a0c"/>
  <!-- Hourglass marking (widow pattern) -->
  <path d="M28 57 L35 63 L42 57 L42 73 L35 67 L28 73 Z" fill="#8b1010" opacity="0.55"/>
  <!-- Abdomen sheen -->
  <ellipse cx="29" cy="57" rx="5" ry="3.5" fill="#5c3820" opacity="0.45"/>

  <!-- PEDICEL (waist stalk) -->
  <ellipse cx="35" cy="46" rx="5.5" ry="5" fill="#150a03"/>

  <!-- CEPHALOTHORAX (head + thorax) -->
  <ellipse cx="35" cy="30" rx="16" ry="14" fill="#1a0e06"/>
  <ellipse cx="35" cy="29" rx="14" ry="12" fill="#3d2510"/>
  <!-- Carapace sheen highlight -->
  <ellipse cx="29" cy="23" rx="5" ry="3" fill="#5c3820" opacity="0.5"/>

  <!-- CHELICERAE (fangs) -->
  <path d="M29 42 Q25 50 26 57" fill="none" stroke="#c8b890" stroke-width="4" stroke-linecap="round"/>
  <path d="M41 42 Q45 50 44 57" fill="none" stroke="#c8b890" stroke-width="4" stroke-linecap="round"/>
  <circle cx="26" cy="58" r="3" fill="#e0d4b0"/>
  <circle cx="44" cy="58" r="3" fill="#e0d4b0"/>

  <!-- EYES row 1 (4 large main eyes) -->
  <ellipse cx="23" cy="25" rx="5" ry="5" fill="#0a0604"/>
  <ellipse cx="30" cy="22" rx="5" ry="5" fill="#0a0604"/>
  <ellipse cx="40" cy="22" rx="5" ry="5" fill="#0a0604"/>
  <ellipse cx="47" cy="25" rx="5" ry="5" fill="#0a0604"/>
  <ellipse cx="23" cy="25" rx="3" ry="3" fill="#0f5c22"/>
  <ellipse cx="30" cy="22" rx="3" ry="3" fill="#0f5c22"/>
  <ellipse cx="40" cy="22" rx="3" ry="3" fill="#0f5c22"/>
  <ellipse cx="47" cy="25" rx="3" ry="3" fill="#0f5c22"/>
  <ellipse cx="23" cy="25" rx="1.4" ry="1.4" fill="#55ff88" opacity="0.9"/>
  <ellipse cx="30" cy="22" rx="1.4" ry="1.4" fill="#55ff88" opacity="0.9"/>
  <ellipse cx="40" cy="22" rx="1.4" ry="1.4" fill="#55ff88" opacity="0.9"/>
  <ellipse cx="47" cy="25" rx="1.4" ry="1.4" fill="#55ff88" opacity="0.9"/>

  <!-- EYES row 2 (4 smaller secondary) -->
  <ellipse cx="27" cy="31" rx="3.5" ry="3.5" fill="#0a0604"/>
  <ellipse cx="33" cy="28" rx="3.5" ry="3.5" fill="#0a0604"/>
  <ellipse cx="37" cy="28" rx="3.5" ry="3.5" fill="#0a0604"/>
  <ellipse cx="43" cy="31" rx="3.5" ry="3.5" fill="#0a0604"/>
  <ellipse cx="27" cy="31" rx="2" ry="2" fill="#1a8c38" opacity="0.8"/>
  <ellipse cx="33" cy="28" rx="2" ry="2" fill="#1a8c38" opacity="0.8"/>
  <ellipse cx="37" cy="28" rx="2" ry="2" fill="#1a8c38" opacity="0.8"/>
  <ellipse cx="43" cy="31" rx="2" ry="2" fill="#1a8c38" opacity="0.8"/>
</svg>
