<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" width="280" height="360">
  <!-- SKULL cranium -->
  <ellipse cx="35" cy="12" rx="14" ry="12" fill="#d4cfc0"/>
  <!-- Jaw -->
  <rect x="24" y="18" width="22" height="10" rx="4" fill="#c8c2b0"/>
  <!-- Eye sockets -->
  <ellipse cx="28.5" cy="10" rx="5.5" ry="6.5" fill="#111827"/>
  <ellipse cx="41.5" cy="10" rx="5.5" ry="6.5" fill="#111827"/>
  <!-- Glowing red eyes -->
  <ellipse cx="28.5" cy="10" rx="3" ry="3.5" fill="#991b1b"/>
  <ellipse cx="41.5" cy="10" rx="3" ry="3.5" fill="#991b1b"/>
  <ellipse cx="28.5" cy="10" rx="1.5" ry="2" fill="#fca5a5" opacity="0.7"/>
  <ellipse cx="41.5" cy="10" rx="1.5" ry="2" fill="#fca5a5" opacity="0.7"/>
  <!-- Nasal cavity -->
  <polygon points="33.5,17 35,14 36.5,17" fill="#111827"/>
  <!-- Teeth -->
  <rect x="25.5" y="25" width="3.5" height="4.5" rx="1" fill="#f0ece0"/>
  <rect x="30.5" y="25" width="3.5" height="4.5" rx="1" fill="#f0ece0"/>
  <rect x="36"   y="25" width="3.5" height="4.5" rx="1" fill="#f0ece0"/>
  <rect x="41"   y="25" width="3.5" height="4.5" rx="1" fill="#f0ece0"/>

  <!-- NECK -->
  <rect x="31.5" y="29.5" width="7" height="7" rx="1.5" fill="#bdb8a8"/>

  <!-- LEFT ARM (raised, threatening) -->
  <path d="M23 40 L13 27 L9 14" fill="none" stroke="#c8c2b0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left claws -->
  <path d="M9 14 L5 7 M9 14 L10 6 M9 14 L14 8" fill="none" stroke="#c8c2b0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- RIGHT ARM (raised, threatening) -->
  <path d="M47 40 L57 27 L61 14" fill="none" stroke="#c8c2b0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right claws -->
  <path d="M61 14 L65 7 M61 14 L60 6 M61 14 L56 8" fill="none" stroke="#c8c2b0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- RIBCAGE -->
  <rect x="21" y="36" width="28" height="22" rx="4" fill="#c8c2b0"/>
  <!-- Sternum -->
  <rect x="32" y="38" width="6" height="18" rx="2" fill="#b0aa98"/>
  <!-- Rib pairs -->
  <path d="M21 42 Q14 44 15 48" fill="none" stroke="#c8c2b0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M21 50 Q13 52 14 56" fill="none" stroke="#c8c2b0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M49 42 Q56 44 55 48" fill="none" stroke="#c8c2b0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M49 50 Q57 52 56 56" fill="none" stroke="#c8c2b0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- PELVIS -->
  <rect x="23" y="58" width="24" height="10" rx="4" fill="#bdb8a8"/>

  <!-- LEFT LEG thigh -->
  <rect x="22" y="68" width="10" height="13" rx="4" fill="#c8c2b0"/>
  <!-- Left knee -->
  <ellipse cx="27" cy="81" rx="6" ry="3.5" fill="#b0aa98"/>
  <!-- Left shin -->
  <rect x="22" y="81" width="10" height="9" rx="3" fill="#c8c2b0"/>

  <!-- RIGHT LEG thigh -->
  <rect x="38" y="68" width="10" height="13" rx="4" fill="#c8c2b0"/>
  <!-- Right knee -->
  <ellipse cx="43" cy="81" rx="6" ry="3.5" fill="#b0aa98"/>
  <!-- Right shin -->
  <rect x="38" y="81" width="10" height="9" rx="3" fill="#c8c2b0"/>
</svg>
