<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- Cape (behind body) -->
  <path d="M20 27 L8 75 L28 66 L32 72 L36 66 L52 75 L40 27 Z" fill="#7f1d1d"/>

  <!-- Body armor -->
  <rect x="18" y="32" width="24" height="26" rx="3" fill="#374151"/>
  <!-- Chest plate -->
  <rect x="22" y="34" width="16" height="12" rx="2" fill="#4b5563"/>
  <!-- Armor trim / belt -->
  <rect x="18" y="53" width="24" height="5" rx="1" fill="#1f2937"/>

  <!-- HELMET -->
  <ellipse cx="30" cy="14" rx="13" ry="12" fill="#374151"/>
  <!-- Visor shadow -->
  <rect x="21" y="16" width="18" height="6" rx="1" fill="#111827"/>
  <!-- Visor glow slit -->
  <rect x="23" y="17.5" width="14" height="2.5" rx="1" fill="#60a5fa" opacity="0.85"/>
  <!-- Helmet brim -->
  <rect x="17" y="23" width="26" height="3.5" rx="1" fill="#1f2937"/>
  <!-- Crest -->
  <rect x="28" y="3" width="4" height="9" rx="1.5" fill="#d97706"/>

  <!-- LEFT ARM (shield side) -->
  <rect x="8" y="34" width="10" height="18" rx="3" fill="#374151"/>
  <!-- Shield -->
  <path d="M2 35 L15 35 L15 53 L8.5 60 L2 53 Z" fill="#1e3a5f"/>
  <path d="M4 37 L13 37 L13 52 L8.5 57 L4 52 Z" fill="#2563eb"/>
  <!-- Shield boss -->
  <circle cx="8.5" cy="47" r="3" fill="#d97706"/>
  <!-- Shield cross -->
  <rect x="7.5" y="38" width="2" height="14" rx="0.8" fill="#d97706" opacity="0.55"/>
  <rect x="4"   y="46" width="9" height="2"  rx="0.8" fill="#d97706" opacity="0.55"/>

  <!-- RIGHT ARM (sword side) -->
  <rect x="42" y="34" width="10" height="18" rx="3" fill="#374151"/>
  <!-- Sword blade -->
  <rect x="48" y="5" width="3.5" height="32" rx="1" fill="#9ca3af"/>
  <rect x="48.5" y="5" width="1.5" height="32" rx="0.5" fill="#e5e7eb"/>
  <!-- Guard -->
  <rect x="44" y="34" width="12" height="4" rx="1" fill="#d97706"/>
  <!-- Grip -->
  <rect x="49" y="38" width="2.5" height="8" rx="1" fill="#3d1f0a"/>
  <!-- Pommel -->
  <circle cx="50.25" cy="47" r="2.5" fill="#d97706"/>

  <!-- LEGS -->
  <rect x="19" y="58" width="10" height="18" rx="3" fill="#1f2937"/>
  <rect x="31" y="58" width="10" height="18" rx="3" fill="#1f2937"/>
  <!-- Boot tops -->
  <rect x="19" y="69" width="10" height="7" rx="2" fill="#111827"/>
  <rect x="31" y="69" width="10" height="7" rx="2" fill="#111827"/>
</svg>
